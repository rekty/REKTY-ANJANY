  <!-- Loading Screen -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      z-index: 9999;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(84, 197, 248, 0.1);
      border-top-color: #54C5F8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      color: #54C5F8;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    
    /* Hide loading when Flutter is ready */
    .flutter-ready #loading {
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">LOADING...</div>
  </div>
  
  <!-- Flutter App Bootstrap -->
  <script>
    // DISABLE SERVICE WORKER FIRST
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }
    
    // Configure Flutter
    window.flutterConfiguration = {
      serviceWorkerSettings: {
        serviceWorkerVersion: null,
      },
    };
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
  
  <!-- Remove loading screen when Flutter is ready -->
  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.body.classList.add('flutter-ready');
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) loading.remove();
      }, 300);
    });
  </script>
</body>
